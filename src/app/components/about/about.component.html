<section id="about" class="section about">
  <div class="container">
    <div class="section-heading reveal">
      <span class="eyebrow">About Me</span>
      <h2>Clean architecture, sharp interfaces, steady delivery.</h2>
    </div>

    <div class="about-grid" @staggerFadeUp>
      <article class="bio-card glass stagger-item reveal">
        <p>{{ profile.bio }}</p>
        <p>
          My focus is building Angular applications that stay easy to extend as products grow,
          backed by pragmatic Spring Boot APIs and data flows that make sense.
        </p>

        <div class="stats">
          <div *ngFor="let stat of profile.stats" class="stat">
            <strong>{{ stat.value }}</strong>
            <span>{{ stat.label }}</span>
          </div>
        </div>
      </article>

      <aside class="skills-card glass stagger-item reveal">
        <h3>Core Skills</h3>
        <div class="skill-cloud">
          <span *ngFor="let skill of profile.skills; let index = index" class="chip" [style.transitionDelay.ms]="index * 28">
            {{ skill }}
          </span>
        </div>
      </aside>
    </div>
  </div>
</section>
