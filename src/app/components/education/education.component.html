<section id="education" class="section education">
  <div class="container">
    <div class="section-heading reveal">
      <span class="eyebrow">Education</span>
      <h2>Academic base and continuous learning.</h2>
    </div>

    <div class="education-grid" @staggerFadeUp>
      <article *ngFor="let item of profile.education" class="education-card glass stagger-item reveal">
        <span class="year">{{ item.year }}</span>
        <h3>{{ item.degree }}</h3>
        <p>{{ item.institution }}</p>
      </article>

      <div class="certifications glass stagger-item reveal">
        <h3>Certifications</h3>
        <div class="cert-grid">
          <article *ngFor="let cert of profile.certifications" class="cert-card">
            <strong>{{ cert.name }}</strong>
            <span>{{ cert.issuer }}</span>
          </article>
        </div>
      </div>
    </div>
  </div>
</section>
